<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Aldrich&family=Pixelify+Sans:wght@400..700&display=swap"
      rel="stylesheet"
    />
    <title>birthday birthday birthday</title>

            <!-- Pixel -->
                <link rel="preconnect" href="https://fonts.googleapis.com">
                <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
                <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">

  </head>
  <body>
    <!-- Envelope Screen -->
    <div id="envelope-container">
      <img src="./images/envelope.PNG" alt="Envelope" id="envelope" />
      <p class="mail"> oh look, a mail!</p>
    </div>

    <!-- Letter Screen -->
    <div id="letter-container">
      <div class="letter-window">
        <h1 id="letter-title">is Z the coolest person ever?</h1>

        <img src="./images/cat.gif" class="cat" id="letter-cat" />

        <div class="buttons" id="letter-buttons">
          <img src="./images/yes.PNG" class="btn yes-btn" alt="Yes" />

          <div class="no-wrapper">
            <img src="./images/no.PNG" class="btn no-btn" alt="No" />
          </div>
        </div>
      </div>
      <img src="./images/Message.png" id="finaltext" class="final-text" style="display: none"/> 

    </div>
    <script src="script.js"></script>
  </body>
</html>
